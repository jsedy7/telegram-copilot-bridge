name: Release

# Triggered when you push a version tag, e.g.:
#   git tag v0.1.8 && git push origin v0.1.8
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish .vsix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build and package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Locate .vsix file
        id: vsix
        run: echo "file=$(ls *.vsix | head -1)" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${GITHUB_REPOSITORY}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Links" >> release_notes.md
          echo "" >> release_notes.md
          echo "- Release: https://github.com/$REPO/releases/tag/$GITHUB_REF_NAME" >> release_notes.md
          echo "- VSIX download: https://github.com/$REPO/releases/download/$GITHUB_REF_NAME/${{ steps.vsix.outputs.file }}" >> release_notes.md
          echo "- Changelog: https://github.com/$REPO/blob/main/CHANGELOG.md" >> release_notes.md
          PREV_TAG="$(git tag --sort=-version:refname | grep -vx "$GITHUB_REF_NAME" | head -1 || true)"
          if [ -n "$PREV_TAG" ]; then
            echo "- Full diff: https://github.com/$REPO/compare/$PREV_TAG...$GITHUB_REF_NAME" >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body_path: release_notes.md
          files: ${{ steps.vsix.outputs.file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
